<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Iris — ¿Te reconoces? 🪞</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0f0a0f;
  --card: #1a111a;
  --card2: #201520;
  --border: #2e1e2e;
  --pink: #e91e8c;
  --pink-soft: #f48fb1;
  --pink-dim: #3a0a2a;
  --cream: #f5e6d3;
  --text: #ede0e8;
  --muted: #9e7a8e;
  --fan-bg: #1a1a2e;
  --fan-border: #5c6bc0;
  --resp-bg: #2a0a1e;
  --resp-border: #e91e8c;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior: none;
}
.screen {
  display: none;
  min-height: 100vh;
}
.screen.active { display: flex; flex-direction: column; }

/* ── INTRO ─────────────────────────────────────────────── */
#intro {
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 28px;
  background: radial-gradient(ellipse at 50% 0%, #3a0a2a 0%, var(--bg) 60%);
}
.intro-mirror { font-size: 4em; margin-bottom: 20px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.intro-title {
  font-size: 2em;
  font-weight: 800;
  color: #fff;
  line-height: 1.15;
  margin-bottom: 14px;
  letter-spacing: -0.5px;
}
.intro-title span { color: var(--pink); }
.intro-sub {
  color: var(--muted);
  font-size: 1em;
  line-height: 1.6;
  margin-bottom: 10px;
  max-width: 320px;
}
.intro-badge {
  display: inline-block;
  background: var(--pink-dim);
  color: var(--pink-soft);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.82em;
  font-weight: 600;
  margin: 16px 0 32px;
}
.btn-start {
  background: linear-gradient(135deg, #e91e8c, #c2185b);
  color: #fff;
  border: none;
  padding: 18px 40px;
  border-radius: 50px;
  font-size: 1.1em;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 24px #e91e8c44;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-start:active { transform: scale(0.96); box-shadow: 0 2px 12px #e91e8c33; }

/* ── EVAL ───────────────────────────────────────────────── */
#eval {
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
  padding: 0 0 60px;
}
.top-bar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
}
.progress-dots {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #2a1a2a;
  border: 1px solid var(--border);
  transition: all 0.2s;
  cursor: pointer;
}
.dot.done { background: var(--pink); border-color: var(--pink); }
.dot.current { background: #fff; border-color: #fff; transform: scale(1.25); }
.dot.partial { background: #ff9800; border-color: #ff9800; }
.top-label {
  text-align: center;
  font-size: 0.75em;
  color: var(--muted);
}

.eval-body { padding: 16px; }

.case-num {
  font-size: 0.7em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--pink);
  margin-bottom: 12px;
}
.bubble-wrap { margin-bottom: 20px; }
.blabel {
  font-size: 0.65em;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 4px;
}
.bubble {
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 0.95em;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}
.bubble.fan {
  background: var(--fan-bg);
  border-left: 3px solid var(--fan-border);
  color: #c5cae9;
}
.bubble.resp {
  background: var(--resp-bg);
  border-left: 3px solid var(--resp-border);
  color: #f8bbd0;
  margin-top: 10px;
}

/* ── QUESTIONS ──────────────────────────────────────────── */
.questions { display: flex; flex-direction: column; gap: 14px; }
.qblock {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}
.qlabel {
  font-size: 0.88em;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}
.qdesc {
  font-size: 0.75em;
  color: var(--muted);
  margin-bottom: 10px;
}
/* Q1: 3 big buttons */
.q1-btns { display: flex; flex-direction: column; gap: 8px; }
.q1-btn {
  width: 100%;
  padding: 13px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 0.9em;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}
.q1-btn:active { transform: scale(0.98); }
.q1-btn.sel-yes  { border-color: #e91e8c; background: #3a0a2a; color: #f48fb1; }
.q1-btn.sel-maybe{ border-color: #ff9800; background: #2a1a00; color: #ffcc02; }
.q1-btn.sel-no   { border-color: #546e7a; background: #0a1a1f; color: #90a4ae; }
/* Q2/Q3: 5 pills */
.pills { display: flex; gap: 6px; }
.pill {
  flex: 1;
  padding: 10px 4px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 0.88em;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.pill:active { transform: scale(0.94); }
.pill.sel-1 { border-color: #f44336; background: #2a0a0a; color: #ef9a9a; }
.pill.sel-2 { border-color: #ff9800; background: #2a1500; color: #ffcc80; }
.pill.sel-3 { border-color: #ffc107; background: #2a1e00; color: #ffe082; }
.pill.sel-4 { border-color: #8bc34a; background: #152a00; color: #c5e1a5; }
.pill.sel-5 { border-color: #4caf50; background: #0a2a0a; color: #a5d6a7; }
.pill-hints {
  display: flex;
  justify-content: space-between;
  font-size: 0.62em;
  color: var(--muted);
  margin-top: 4px;
  padding: 0 2px;
}
/* Q4 textarea */
.q4-area {
  width: 100%;
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 0.9em;
  padding: 10px 12px;
  resize: none;
  min-height: 70px;
  font-family: inherit;
  line-height: 1.5;
}
.q4-area:focus { outline: none; border-color: var(--pink); }
.q4-area::placeholder { color: var(--muted); }

/* ── NAV ────────────────────────────────────────────────── */
.nav {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.btn-nav {
  flex: 1;
  padding: 15px;
  border-radius: 12px;
  border: none;
  font-size: 0.95em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-nav:active { transform: scale(0.97); }
.btn-back {
  background: var(--card);
  color: var(--muted);
  border: 1px solid var(--border);
  max-width: 90px;
}
.btn-next {
  background: linear-gradient(135deg, #e91e8c, #c2185b);
  color: #fff;
  box-shadow: 0 2px 14px #e91e8c33;
}
.btn-next:disabled {
  background: var(--card);
  color: #4a2a3a;
  box-shadow: none;
  cursor: not-allowed;
}

/* ── DONE ───────────────────────────────────────────────── */
#done {
  align-items: center;
  justify-content: flex-start;
  padding: 40px 24px 60px;
  background: radial-gradient(ellipse at 50% 0%, #3a0a2a 0%, var(--bg) 60%);
  text-align: center;
}
.done-emoji { font-size: 3.5em; margin-bottom: 16px; }
.done-title { font-size: 1.8em; font-weight: 800; color: #fff; margin-bottom: 8px; }
.done-sub { color: var(--muted); font-size: 0.95em; line-height: 1.6; margin-bottom: 24px; }
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 360px;
  margin-bottom: 28px;
}
.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 8px;
}
.stat-val { font-size: 1.6em; font-weight: 800; color: var(--pink); }
.stat-lbl { font-size: 0.65em; color: var(--muted); margin-top: 2px; line-height: 1.3; }
.btn-wa {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #25d366;
  color: #fff;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 1em;
  font-weight: 700;
  text-decoration: none;
  box-shadow: 0 4px 20px #25d36644;
  transition: transform 0.15s;
  max-width: 320px;
  width: 100%;
  margin-bottom: 12px;
}
.btn-wa:active { transform: scale(0.97); }
.btn-wa svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }
.btn-restart {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 0.85em;
  cursor: pointer;
  max-width: 320px;
  width: 100%;
}
</style>
</head>
<body>

<!-- ── INTRO ─────────────────────────────────────────────── -->
<div id="intro" class="screen active">
  <div class="intro-mirror">🪞</div>
  <h1 class="intro-title">Iris, ¿te<br><span>reconoces?</span></h1>
  <p class="intro-sub">
    Te enseñamos 20 mensajes.<br>
    Algunos los escribiste <strong style="color:#fff">tú</strong>,<br>
    otros los escribió una <strong style="color:#fff">IA</strong>.<br>
    ¿Sabrás distinguirlos?
  </p>
  <div class="intro-badge">2-3 minutitos 🩷</div>
  <button class="btn-start" onclick="startEval()">Vinga, empezem! →</button>
</div>

<!-- ── EVAL ──────────────────────────────────────────────── -->
<div id="eval" class="screen">
  <div class="top-bar">
    <div class="progress-dots" id="dots"></div>
    <div class="top-label" id="top-label">Caso 1 de 20</div>
  </div>
  <div class="eval-body" id="eval-body"></div>
</div>

<!-- ── DONE ──────────────────────────────────────────────── -->
<div id="done" class="screen">
  <div class="done-emoji">🎉🩷</div>
  <h2 class="done-title">Gràcies nena!</h2>
  <p class="done-sub">Has evaluat els 20 missatges.<br>Envia els resultats a Manel! ✨</p>
  <div class="stats-grid" id="stats-grid"></div>
  <a id="wa-link" href="#" class="btn-wa">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    Enviar resultats a Manel
  </a>
  <button class="btn-restart" onclick="restart()">Tornar a començar</button>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────
const CASES = [
  {"lead":"besitos bombon buen finde, mañana grabar mucho EN MODO CINE Y SIN PARPADEOSSSSSS","response":"No xk t'ho va passar l'Aida"},
  {"lead":"No puedo venir 🥹🥹🥹","response":"Que te llamo la atencion?"},
  {"lead":"Vale ens veiem 18:30","response":"Es esta pero más larga"},
  {"lead":"Iris que no et preocupis per k vé la Rafi amb mi,no sé si ho saps","response":"Bueno, que no et preocupis, ja."},
  {"lead":"I qe em disculpes amb tu","response":"Ja, no fa res! En què et puc ajudar?"},
  {"lead":"Ella sempre es tallava les ungles","response":"Me abrirás tu parkinssito perfavore😂😂😂 pa tu poor sister"},
  {"lead":"Agujetas del copon hasta ayer","response":"No de pregunta"},
  {"lead":"No menjis carn ni porc,hia un problema ,per favor busca información.i ho vauràs,","response":"Ha anat moltbé"},
  {"lead":"Treballo tot el dia","response":"Hola! Que te llamo la atencion?"},
  {"lead":"No la apallicis a la Princesa que fa molt dues que no camina,nomès en falta ella","response":"Hi ha gent que si hi ha gent que no"},
  {"lead":"Si x mi millor","response":"Lo que hicimos contigo"},
  {"lead":"Ara despres tel carrego mes el Movil","response":"31 tooppp mamita"},
  {"lead":"Vale fabuloso","response":"Vale, que cuca."},
  {"lead":"Esta noche a que hora plegas?","response":"Si fuera rica no ensayaría como una gitana"},
  {"lead":"Vale bebesita el penjo i ens veiem diumenge","response":"Vale, diumenge estic pendent!"},
  {"lead":"JAJAJAJAJ gracias x el dato","response":"Levantarse con este mensaje después de hacer un día increible y todo grabado"},
  {"lead":"Pero he començat normal","response":"Hola. Que te llamo la atencion?"},
  {"lead":"Moltisimes gràcies,sobre tot,intente tornar de dia sis plau","response":"De res. Per què vols tornar de dia sis?"},
  {"lead":"Sii! Ara diu el meu pare qe avui n es farà res, aixi qe vinc a les 10:30h🫂😘","response":"Perfecte. T'espero amb els braços oberts"},
  {"lead":"No tel va regalar nosequi?","response":"Ja, què vols saber?"}
];

// Answer key — for WhatsApp results only (not shown to Iris)
const KEY = ["real","bot","real","bot","bot","real","real","real","bot","real","real","real","bot","real","bot","real","bot","bot","bot","bot"];

const Q1_OPTIONS = [
  {val:'yes',  label:'Sí, soy yo 🩷',         cls:'sel-yes'},
  {val:'maybe',label:'No estoy segura 🤔',    cls:'sel-maybe'},
  {val:'no',   label:'No, esto no es mío ❌',cls:'sel-no'},
];
const Q2_HINTS = ['Ni de coña','','','','Tal cual'];
const Q3_HINTS = ['Fuera de lugar','','','','Perfecto'];

const SK = 'iris_turing_v1';
let current = 0;
let answers = {};

function load() {
  try { const s = localStorage.getItem(SK); if(s) answers = JSON.parse(s); } catch(e){}
}
function save() {
  try { localStorage.setItem(SK, JSON.stringify(answers)); } catch(e){}
}
function isComplete(i) {
  const a = answers[i]||{};
  return a.q1 != null && a.q2 != null && a.q3 != null;
}
function isPartial(i) {
  const a = answers[i]||{};
  return (a.q1!=null||a.q2!=null||a.q3!=null) && !isComplete(i);
}
function countDone() {
  return CASES.reduce((n,_,i)=>n+(isComplete(i)?1:0),0);
}

function startEval() {
  document.getElementById('intro').classList.remove('active');
  document.getElementById('eval').classList.add('active');
  // Jump to first incomplete
  for(let i=0;i<CASES.length;i++){
    if(!isComplete(i)){current=i;break;}
  }
  renderDots();
  renderCase();
}

function renderDots() {
  const el = document.getElementById('dots');
  el.innerHTML = '';
  CASES.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className='dot'+(i===current?' current':isComplete(i)?' done':isPartial(i)?' partial':'');
    d.onclick=()=>goTo(i);
    el.appendChild(d);
  });
  document.getElementById('top-label').textContent =
    `Cas ${current+1} de ${CASES.length} · ${countDone()}/20 completats`;
}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function renderCase() {
  const c = CASES[current];
  const a = answers[current]||{};
  const done = isComplete(current);
  const isLast = current===CASES.length-1;

  const q1html = Q1_OPTIONS.map(o=>`
    <button class="q1-btn ${a.q1===o.val?o.cls:''}" onclick="pickQ1(${current},'${o.val}','${o.cls}')">${o.label}</button>
  `).join('');

  const q2html = [1,2,3,4,5].map(v=>`
    <button class="pill ${a.q2===v?'sel-'+v:''}" onclick="pickQ(${current},'q2',${v})">${v}</button>
  `).join('');

  const q3html = [1,2,3,4,5].map(v=>`
    <button class="pill ${a.q3===v?'sel-'+v:''}" onclick="pickQ(${current},'q3',${v})">${v}</button>
  `).join('');

  document.getElementById('eval-body').innerHTML = `
    <div class="case-num">Missatge ${current+1} de 20</div>

    <div class="bubble-wrap">
      <div class="blabel">Fan</div>
      <div class="bubble fan">${esc(c.lead)}</div>
      <div class="bubble resp">${esc(c.response)}</div>
    </div>

    <div class="questions">
      <div class="qblock">
        <div class="qlabel">¿Esto lo has escrito tú?</div>
        <div class="qdesc">Basándote solo en el texto de la respuesta</div>
        <div class="q1-btns">${q1html}</div>
      </div>

      <div class="qblock">
        <div class="qlabel">¿Lo enviarías tal cual?</div>
        <div class="qdesc">1 = Ni de coña · 5 = Tal cual</div>
        <div class="pills">${q2html}</div>
        <div class="pill-hints"><span>Ni de coña</span><span>Tal cual</span></div>
      </div>

      <div class="qblock">
        <div class="qlabel">¿El tono es correcto?</div>
        <div class="qdesc">1 = Fuera de lugar · 5 = Perfecto</div>
        <div class="pills">${q3html}</div>
        <div class="pill-hints"><span>Fuera de lugar</span><span>Perfecto</span></div>
      </div>

      <div class="qblock">
        <div class="qlabel">¿Tú qué dirías? <span style="color:var(--muted);font-weight:400">(opcional)</span></div>
        <textarea class="q4-area"
          placeholder="Escribe cómo responderías tú..."
          oninput="pickQ4(${current},this.value)"
        >${esc(a.q4||'')}</textarea>
      </div>
    </div>

    <div class="nav">
      ${current>0
        ?`<button class="btn-nav btn-back" onclick="goTo(${current-1})">←</button>`
        :'<div style="max-width:90px;flex:0 0 90px"></div>'
      }
      <button class="btn-nav btn-next"
        onclick="${isLast&&done?'showDone()':'goNext()'}"
        ${!done?'disabled':''}
      >${isLast?'Finalizar ✓':'Siguiente →'}</button>
    </div>
  `;

  window.scrollTo(0,0);
}

function pickQ1(i, val, cls) {
  if(!answers[i]) answers[i]={};
  answers[i].q1 = val;
  save();
  renderDots();
  renderCase();
}
function pickQ(i, key, val) {
  if(!answers[i]) answers[i]={};
  answers[i][key] = val;
  save();
  renderDots();
  renderCase();
}
function pickQ4(i, val) {
  if(!answers[i]) answers[i]={};
  answers[i].q4 = val;
  save();
}

function goTo(i) {
  current = i;
  renderDots();
  renderCase();
}
function goNext() {
  if(current < CASES.length-1){
    current++;
    renderDots();
    renderCase();
  }
}

function showDone() {
  document.getElementById('eval').classList.remove('active');
  document.getElementById('done').classList.add('active');
  buildStats();
  buildWA();
  window.scrollTo(0,0);
}

function buildStats() {
  let envTotal=0, tonoTotal=0, n=0;
  let correctGuess=0;
  CASES.forEach((_,i)=>{
    const a=answers[i]||{};
    if(isComplete(i)){
      envTotal+=a.q2||0;
      tonoTotal+=a.q3||0;
      n++;
      // correct guess
      const guessReal = a.q1==='yes';
      const isReal = KEY[i]==='real';
      if(guessReal===isReal) correctGuess++;
    }
  });
  const fmt=x=>n>0?(x/n).toFixed(1):'-';
  const pct=n>0?Math.round(correctGuess/n*100):0;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-box"><div class="stat-val">${pct}%</div><div class="stat-lbl">Encerts<br>Turing</div></div>
    <div class="stat-box"><div class="stat-val">${fmt(envTotal)}</div><div class="stat-lbl">Avg<br>enviarías</div></div>
    <div class="stat-box"><div class="stat-val">${fmt(tonoTotal)}</div><div class="stat-lbl">Avg<br>tono</div></div>
  `;
}

function buildWA() {
  const lines=['🪞 *Iris Turing Test — Resultats*',''];
  let envT=0,tonoT=0,n=0,correct=0;
  CASES.forEach((c,i)=>{
    const a=answers[i]||{};
    if(!isComplete(i)) return;
    const isReal=KEY[i]==='real';
    const guessReal=a.q1==='yes';
    const hit=guessReal===isReal;
    if(hit) correct++;
    envT+=a.q2||0; tonoT+=a.q3||0; n++;
    const tag=isReal?'[REAL]':'[BOT ]';
    const guess=a.q1==='yes'?'✅ yo':a.q1==='maybe'?'🤔 ns':'❌ no';
    lines.push(`*${i+1}.* ${tag} ${guess} · env:${a.q2} tono:${a.q3}`);
    if(a.q4&&a.q4.trim()) lines.push(`   💬 "${a.q4.trim()}"`);
  });
  lines.push('');
  if(n>0){
    lines.push(`*Resum (n=${n})*`);
    lines.push(`Encerts: ${correct}/${n} (${Math.round(correct/n*100)}%)`);
    lines.push(`Enviaries: ${(envT/n).toFixed(2)} | Tono: ${(tonoT/n).toFixed(2)}`);
  }
  const url='https://wa.me/34639066982?text='+encodeURIComponent(lines.join('\n'));
  document.getElementById('wa-link').href=url;
}

function restart() {
  if(!confirm('Esborrar totes les respostes i tornar a començar?')) return;
  answers={}; current=0;
  try{localStorage.removeItem(SK);}catch(e){}
  document.getElementById('done').classList.remove('active');
  document.getElementById('intro').classList.add('active');
  window.scrollTo(0,0);
}

// ── INIT ─────────────────────────────────────────────────────────────────
load();
renderDots();
// If already done, go straight to done screen
if(countDone()===CASES.length){
  showDone();
} else {
  // Find first incomplete
  for(let i=0;i<CASES.length;i++){
    if(!isComplete(i)){current=i;break;}
  }
}
</script>
