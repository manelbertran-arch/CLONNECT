[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q
filterwarnings =
    ignore::DeprecationWarning

# To run with coverage:
# pytest --cov=api --cov=core --cov=services --cov-report=html --cov-report=term-missing
