name: Contract Enforcement

on:
  pull_request:
    paths:
      - 'core/**/*.py'
      - 'services/**/*.py'
      - 'api/**/*.py'
      - 'scripts/ci/contract_enforcement.py'

jobs:
  enforce:
    name: ARC5 Contract Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-lite.txt

      - name: Run contract enforcement (strict)
        run: python scripts/ci/contract_enforcement.py --strict

      - name: Upload violation report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contract-violations
          path: |
            docs/audit_sprint5/
          if-no-files-found: ignore
