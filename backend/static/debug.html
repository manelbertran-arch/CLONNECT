<!DOCTYPE html>
<html>
<head>
    <title>Clonnect Debug</title>
    <style>
        body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; }
        .ok { color: #4ade80; }
        .error { color: #f87171; }
        .pending { color: #fbbf24; }
        pre { background: #16213e; padding: 10px; overflow: auto; max-height: 300px; }
        button { background: #7c3aed; color: white; border: none; padding: 10px 20px; cursor: pointer; margin: 5px; border-radius: 5px; }
        button:hover { background: #6d28d9; }
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #16213e; }
    </style>
</head>
<body>
    <h1>Clonnect Debug Panel</h1>

    <h2>1. Backend Endpoints</h2>
    <div id="endpoints"></div>

    <h2>2. Frontend Assets</h2>
    <div id="assets"></div>

    <h2>3. Debug Status (Server)</h2>
    <pre id="debug-status">Loading...</pre>

    <h2>4. React App Test</h2>
    <div id="react-test"></div>
    <iframe id="app-frame" src="/login" style="width:100%; height:400px; border:1px solid #333; margin-top:10px; background: white;"></iframe>

    <h2>5. Network Log</h2>
    <pre id="network-log">Click "Test All" to start...</pre>

    <button onclick="testAll()">Test All Endpoints</button>
    <button onclick="location.reload()">Refresh Page</button>
    <button onclick="clearCache()">Clear Cache & Reload</button>

    <script>
        const ENDPOINTS = [
            { name: 'Health', url: '/health' },
            { name: 'Debug Status', url: '/debug/status' },
            { name: 'Auth Login (demo)', url: '/auth/login', method: 'POST', body: JSON.stringify({email: 'stefano@stefanobonanno.com', password: 'demo2024'}) },
            { name: 'Dashboard Overview', url: '/dashboard/stefano_auto/overview' },
            { name: 'Creator Config', url: '/creator/config/stefano_auto' },
            { name: 'Products', url: '/creator/stefano_auto/products?active_only=false' },
            { name: 'Connections', url: '/connections/stefano_auto' },
            { name: 'Conversations', url: '/dm/conversations/stefano_auto?limit=5' },
        ];

        async function testEndpoint(ep) {
            const start = Date.now();
            try {
                const opts = { method: ep.method || 'GET' };
                if (ep.body) {
                    opts.headers = { 'Content-Type': 'application/json' };
                    opts.body = ep.body;
                }
                const res = await fetch(ep.url, opts);
                const time = Date.now() - start;
                const data = await res.text();
                return {
                    name: ep.name,
                    url: ep.url,
                    status: res.status,
                    time: time,
                    ok: res.ok,
                    size: data.length,
                    preview: data.substring(0, 300)
                };
            } catch (e) {
                return {
                    name: ep.name,
                    url: ep.url,
                    status: 'ERROR',
                    error: e.message,
                    ok: false,
                    time: Date.now() - start
                };
            }
        }

        async function testAll() {
            // Test endpoints
            const endpointsDiv = document.getElementById('endpoints');
            endpointsDiv.innerHTML = '<p class="pending">Testing endpoints...</p>';

            let html = '<table><tr><th>Endpoint</th><th>Status</th><th>Time</th><th>Size</th></tr>';
            const networkLog = [];

            for (const ep of ENDPOINTS) {
                const result = await testEndpoint(ep);
                networkLog.push(result);
                const statusClass = result.ok ? 'ok' : 'error';
                html += `<tr>
                    <td>${result.name}<br><small style="color:#888">${result.url}</small></td>
                    <td class="${statusClass}">${result.status}</td>
                    <td>${result.time || '-'}ms</td>
                    <td>${result.size || '-'} bytes</td>
                </tr>`;
            }
            html += '</table>';
            endpointsDiv.innerHTML = html;

            document.getElementById('network-log').textContent = JSON.stringify(networkLog, null, 2);

            // Test assets
            const assetsDiv = document.getElementById('assets');
            try {
                const indexRes = await fetch('/');
                const indexHtml = await indexRes.text();

                // Extract JS/CSS files from index.html
                const jsMatches = indexHtml.match(/src="([^"]+\.js)"/g) || [];
                const cssMatches = indexHtml.match(/href="([^"]+\.css)"/g) || [];

                const jsFiles = jsMatches.map(m => m.replace('src="', '').replace('"', ''));
                const cssFiles = cssMatches.map(m => m.replace('href="', '').replace('"', ''));

                assetsDiv.innerHTML = `
                    <p><strong>Index HTML:</strong> <span class="${indexRes.ok ? 'ok' : 'error'}">${indexRes.status}</span> (${indexHtml.length} bytes)</p>
                    <p><strong>JS Files:</strong> ${jsFiles.join(', ') || 'None found'}</p>
                    <p><strong>CSS Files:</strong> ${cssFiles.join(', ') || 'None found'}</p>
                    <details>
                        <summary>View index.html source</summary>
                        <pre>${escapeHtml(indexHtml)}</pre>
                    </details>
                `;

                // React test
                const reactTest = document.getElementById('react-test');
                const hasReactRoot = indexHtml.includes('id="root"');
                const hasScripts = jsFiles.length > 0;
                reactTest.innerHTML = `
                    <p>Has #root div: <span class="${hasReactRoot ? 'ok' : 'error'}">${hasReactRoot}</span></p>
                    <p>Has JS bundle: <span class="${hasScripts ? 'ok' : 'error'}">${hasScripts}</span></p>
                    <p>JS bundle name: <span class="ok">${jsFiles[0] || 'N/A'}</span></p>
                `;
            } catch (e) {
                assetsDiv.innerHTML = `<p class="error">Error loading assets: ${e.message}</p>`;
            }

            // Get debug status
            try {
                const debugRes = await fetch('/debug/status');
                const debugData = await debugRes.json();
                document.getElementById('debug-status').textContent = JSON.stringify(debugData, null, 2);
            } catch (e) {
                document.getElementById('debug-status').textContent = 'Error: ' + e.message;
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function clearCache() {
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => caches.delete(name));
                });
            }
            location.reload(true);
        }

        // Auto-run on load
        testAll();
    </script>
</body>
</html>
