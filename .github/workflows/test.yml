name: Clonnect CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ==================== BACKEND ====================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lite.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          DATABASE_URL: ""
          TESTING: "true"
          OPENAI_API_KEY: "test-key"
          ANTHROPIC_API_KEY: "test-key"
          INSTAGRAM_ACCESS_TOKEN: "test-token"
          META_APP_SECRET: "test-secret"
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing -v --ignore=tests/contracts --ignore=tests/e2e --ignore=tests/academic -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  # ==================== FRONTEND ====================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript check
        working-directory: ./frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm test -- --run --coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        continue-on-error: true

  # ==================== CONTRACT TESTS ====================
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install pytest pydantic

      - name: Run contract tests
        working-directory: ./backend
        run: pytest tests/contracts/ -v --tb=short

  # ==================== E2E SMOKE TEST ====================
  e2e-smoke:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Health check - Production Backend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://www.clonnectapp.com/health)
          if [ "$response" != "200" ]; then
            echo "Backend health check failed with status $response"
            exit 1
          fi
          echo "Backend is healthy ✅"

      - name: Health check - API Endpoint
        run: |
          response=$(curl -s https://www.clonnectapp.com/health)
          echo "Health response: $response"
          if echo "$response" | grep -q '"status":"healthy"'; then
            echo "API is healthy ✅"
          else
            echo "API health check failed"
            exit 1
          fi

  # ==================== NOTIFY ====================
  notify:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, contract-tests]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## 📊 Clonnect Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend-test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend-test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contracts | ${{ needs.contract-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
