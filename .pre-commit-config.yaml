# Pre-commit hooks for CLONNECT
# Install: pip install pre-commit && pre-commit install

repos:
  # Python formatting
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        args: [--line-length=100]
        files: ^backend/

  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]
        files: ^backend/

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --ignore=E501,W503,E203]
        files: ^backend/

  # Quick pytest check (fast tests only)
  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest-quick
        entry: bash -c 'cd backend && python -m pytest tests/test_health.py tests/test_config.py -x -q --tb=no 2>/dev/null || true'
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]

  # Frontend lint
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npm run lint --silent 2>/dev/null || true'
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false

  # Prevent commits with debug statements
  - repo: local
    hooks:
      - id: no-debug
        name: no-debug-statements
        entry: bash -c 'grep -r "console\.log\|debugger\|print(" --include="*.ts" --include="*.tsx" --include="*.py" . 2>/dev/null | grep -v node_modules | grep -v __pycache__ | grep -v ".test." | head -5 && exit 1 || exit 0'
        language: system
        pass_filenames: false

  # Check for large files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
